name: Build Docker Compose

on:
  repository_dispatch:
    types: [build_completed]

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build docker-compose
        run: docker compose build

      - name: Run services (test)
        run: docker compose up -d

      - name: Save images
        run: docker save user_service:latest survey_service:latest response_service:latest aggregator_service:latest > images.tar

      - uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: images.tar

      - uses: actions/download-artifact@v4
        with:
          name: docker-image